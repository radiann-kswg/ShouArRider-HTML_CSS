      <div class="background0">

      <div class="background0">
        <h2>新着情報</h2>

        <!-- ▼▼▼ 新着情報 記入ひな形 ▼▼▼

          セクションは日付ごとに <div class="background1"> ブロックで区切ります。
          各記事は list-comp コンポーネントで記述します。
          ・画像あり → :wide-style="true"
          ・リンクのみ → :wide-style 省略（デフォルト false）

          ─────────────────────────────────
          【進行中セクション（継続中の情報）】
          ─────────────────────────────────
          <div class="background1">
            <h3>進行中</h3>

            ＜画像ありワイドカード＞
            <list-comp :wide-style="true">
              <template #title>記事タイトル</template>
              <template #imagelink>
                <a href="リンク先URL">
                  <img src="/img/ファイル名.png" alt="画像の説明" />
                </a>
              </template>
              <a class="a-link" href="リンク先URL">リンクテキスト1</a>
              <a class="a-link" href="リンク先URL">リンクテキスト2</a>
            </list-comp>

            ＜リンクのみ（画像なし）カード＞
            <list-comp>
              <template #title>記事タイトル</template>
              <a class="a-link" href="リンク先URL">リンクテキスト</a>
            </list-comp>
          </div>

          ─────────────────────────────────
          【日付別セクション（例: 20XX年X月）】
          ─────────────────────────────────
          <div class="background1">
            <h3>20XX年X月</h3>

            <list-comp :wide-style="true">
              <template #title>記事タイトル</template>
              <template #imagelink>
                <a href="リンク先URL">
                  <img src="/img/ファイル名.png" alt="画像の説明" />
                </a>
              </template>
              <a class="a-link" href="リンク先URL">リンクテキスト</a>
            </list-comp>
          </div>

        ▲▲▲ ひな形ここまで / 以下に実際のお知らせを記載してください ▲▲▲ -->
      </div>
